@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap');

.card { width:100%; position:relative; z-index:1; overflow:hidden; border-radius:16px; cursor:default; border:1px solid rgba(108,94,116,.13); box-shadow:0 10px 22px rgba(120,116,128,.06),0 2px 6px rgba(120,116,128,.032),inset 0 1px 0 rgba(255,255,255,.68); background:rgba(255,255,255,.50); backdrop-filter:blur(18px) saturate(.62); transition:transform .32s ease,box-shadow .56s ease,filter .56s ease,border-color .56s ease,background .7s ease,backdrop-filter .7s ease; }
