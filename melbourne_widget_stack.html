/* SharePoint/Notion embed height fix:
   Keeps the widget pinned to its natural content height when the iframe/web part is dragged taller. */
html,
body,
#root {
  height: auto !important;
  min-height: 0 !important;
  max-height: none !important;
}

body {
  display: block !important;
  overflow-x: hidden !important;
  overflow-y: visible !important;
}

#root,
.app-shell,
.widget-stack {
  height: auto !important;
  min-height: 0 !important;
  align-content: flex-start !important;
  align-items: stretch !important;
  justify-content: flex-start !important;
}

.app-shell {
  display: block !important;
}

.widget-stack {
  margin: 0 auto 0 0;
  flex: 0 0 auto !important;
  gap: 8px !important;
}

.card {
  flex: 0 0 auto !important;
}

/* Optional: if SharePoint gives the iframe extra blank height, this makes the blank area transparent rather than looking like a spaced-out widget. */
html,
body {
  background: transparent !important;
}

}

          {label:'Next Hour',value:weather.nextHourTemp!==null?`${weather.nextHourTemp}°`:'-'},
          {label:'Rain Chance',value:weather.rainProb!=null?`${weather.rainProb}%`:'-'},
          {label:'Wind',value:weather.wind!=null?`${windDesc(weather.wind)} · ${weather.wind} km/h${windDirection?` ${windDirection}`:''}`:'-'}
        ];

        useEffect(()=>{const id=setInterval(()=>setTime(getTime()),1000);return()=>clearInterval(id);},[]);
        useEffect(()=>{
          fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.8136&longitude=144.9631&current=temperature_2m,weather_code,apparent_temperature,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=Australia%2FMelbourne&wind_speed_unit=kmh&forecast_days=2')
            .then(r=>r.json()).then(data=>{
              const c=data.current||{};
              const [label,type]=WMO[c.weather_code]||['Unavailable','clear'];
              const hourlyIndex=nearestHourlyIndex(data?.hourly?.time);
              const nextHourlyIndex=Math.min(hourlyIndex+1,(data?.hourly?.temperature_2m?.length||1)-1);
              setWeather({temp:safeRound(c.temperature_2m),feels:safeRound(c.apparent_temperature),wind:safeRound(c.wind_speed_10m),windDir:c.wind_direction_10m??null,rainProb:data?.hourly?.precipitation_probability?.[hourlyIndex]??null,sunrise:data?.daily?.sunrise?.[0]??null,sunset:data?.daily?.sunset?.[0]??null,nextSunrise:data?.daily?.sunrise?.[1]??null,high:safeRound(data?.daily?.temperature_2m_max?.[0]),low:safeRound(data?.daily?.temperature_2m_min?.[0]),nextHourTemp:safeRound(data?.hourly?.temperature_2m?.[nextHourlyIndex]),label,type});
            }).catch(()=>setWeather(w=>({...w,label:'Unavailable'})));
        },[]);
        useEffect(()=>{
          const onPointerDown=e=>{
            if(calendarCardRef.current?.contains(e.target))return;
            setCalendarOpen(false);
            setCalendarTooltip(null);
          };
          document.addEventListener('pointerdown',onPointerDown);
          return()=>document.removeEventListener('pointerdown',onPointerDown);
        },[]);

        const addRipple=e=>{const rect=e.currentTarget.getBoundingClientRect();const id=Date.now()+Math.random();setRipples(r=>[...r,{x:e.clientX-rect.left,y:e.clientY-rect.top,id}]);setTimeout(()=>setRipples(r=>r.filter(v=>v.id!==id)),750);};

        const calCells=(()=>{
          const cells=[];
          const first=(getFirstDow(viewYear,viewMonth)+6)%7;
          const dim=getDaysInMonth(viewYear,viewMonth);
          const prevDim=getDaysInMonth(viewYear,viewMonth-1);
          for(let i=first-1;i>=0;i--){const d=prevDim-i,dt=new Date(viewYear,viewMonth-1,d);cells.push({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate(),other:true});}
          for(let d=1;d<=dim;d++)cells.push({y:viewYear,m:viewMonth,d,other:false});
          while(cells.length<42){const d=cells.length-first-dim+1,dt=new Date(viewYear,viewMonth+1,d);cells.push({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate(),other:true});}
          return cells;
        })();

        const selDate=new Date(selectedDate.y,selectedDate.m,selectedDate.d);
        const selWeekday=selDate.toLocaleDateString('en-AU',{weekday:'long'});
        const selectCalendarDate=(cell,hasEvent)=>{
          setSelectedDate({y:cell.y,m:cell.m,d:cell.d});
          setCalendarOpen(hasEvent);
          setMonthBannerOpen(false);
          if(cell.other){setViewYear(cell.y);setViewMonth(cell.m);}
        };
        const showCalendarTooltip=(event,el)=>{
          const grid=calendarGridRef.current;
          if(!event||!grid){setCalendarTooltip(null);return;}
          const gridRect=grid.getBoundingClientRect();
          const cellRect=el.getBoundingClientRect();
          const width=188;
          const left=Math.min(Math.max(cellRect.left-gridRect.left+(cellRect.width-width)/2,0),Math.max(gridRect.width-width,0));
          const cellTop=cellRect.top-gridRect.top;
          const top=cellTop<gridRect.height/2?cellTop+cellRect.height+5:Math.max(cellTop-35,0);
          setCalendarTooltip({event,left,top});
        };
        const goPrev=()=>{setCalendarOpen(false);setMonthBannerOpen(false);if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);};
        const goNext=()=>{setCalendarOpen(false);setMonthBannerOpen(false);if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);};

        return <>
          <style>{FONTS}</style>
          <div className="app-shell">
            <div className="widget-stack">
              <div
                className="card time-card"
                role="button"
                tabIndex="0"
                aria-label={`Switch to ${is24Hour?'12-hour':'24-hour'} time`}
                title={`Switch to ${is24Hour?'12-hour':'24-hour'} time`}
                onClick={()=>setIs24Hour(v=>!v)}
                onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();setIs24Hour(v=>!v);}}}
              >
                <div className="time-format-cue" aria-hidden="true">
                  <svg viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="8" r="5.6" stroke="currentColor" strokeWidth="1.35"/>
                    <path d="M8 4.8V8l2.4 1.4" stroke="currentColor" strokeWidth="1.35" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <span>{is24Hour?'12H':'24H'}</span>
                </div>
                <div className="time-display">
                  <div className="time-main" key={`${is24Hour?'24':'12'}-${time.h}:${time.m}`}>
                    {displayHour}<span className="time-colon">:</span>{time.m}
                  </div>
                  <div className={`time-period ${is24Hour?'':'visible'}`} aria-hidden={is24Hour}>{displayPeriod}</div>
                </div>
                <div className="date-line">
                  {time.date}
                </div>
              </div>

              <div className="card weather-card" onClick={addRipple}>
                {ripples.map(r=><div key={r.id} className="ripple-wave" style={{left:r.x,top:r.y}}/>)}
                <div className="section-main">
                  <div className="weather-row">
                    <div className="section-copy">
                      <div className="eyebrow">Melbourne</div>
                      <div className="metric-line">
                        <div className="weather-temp">{weather.temp!==null?`${weather.temp}°`:'-'}</div>
                        <div className="weather-label">{weather.label}</div>
                      </div>
                    </div>
                    <WeatherIcon type={weather.type}/>
                  </div>
                </div>
                <div className={`drawer ${weatherOpen?'open':''}`}>
                  <div className="summary-hero">
                    <div className="summary-label">Feels Like</div>
                    <div className="summary-hero-line">
                      <div className="summary-main-value">{weather.feels!==null?`${weather.feels}°`:'-'}</div>
                      <div className="summary-note">{weather.high!==null&&weather.low!==null?`High ${weather.high}° · Low ${weather.low}°`:''}</div>
                    </div>
                  </div>
                  {weatherRows.map(item=>(
                    <div key={item.label} className="summary-row"><div className="summary-row-label">{item.label}</div><div className="summary-row-value">{item.value}</div></div>
                  ))}
                </div>
                <DrawerToggle open={weatherOpen} onClick={e=>{e.stopPropagation();setWeatherOpen(v=>!v);}}/>
              </div>

              <div className="card astro-card">
                <div className="section-main">
                  <div className="astro-row">
                    <div className="section-copy">
                      <div className="eyebrow">Lunar</div>
                      <div className="astro-main">{astro.moonPhase}</div>
                    </div>
                    <div className="astro-orb"><img className="moon-phase-img" src={`moon-icons/${astro.moonAsset}.svg`} alt="" aria-hidden="true"/></div>
                  </div>
                </div>
              </div>

              <div className="card calendar-card" ref={calendarCardRef}>
                <div className="section-main">
                  <div className="calendar-header">
                    <div className="section-copy">
                      <div className="eyebrow">Calendar</div>
                      <div className="calendar-heading">
                        <div className="calendar-title">{MONTHS[viewMonth]}</div>
                        <div className="calendar-year">{viewYear}</div>
                      </div>
                    </div>
                    <div className="calendar-controls">
                      <button className="calendar-btn" onClick={goPrev} aria-label="Previous month"><svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M10.8 4.8 L6.6 9 L10.8 13.2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
                      <button className="calendar-btn" onClick={goNext} aria-label="Next month"><svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M7.2 4.8 L11.4 9 L7.2 13.2" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg></button>
                    </div>
                  </div>
                  {monthLongEvents.length>0&&(
                    <div className="month-banner">
                      <button className="month-banner-main" type="button" onClick={()=>setMonthBannerOpen(v=>!v)} aria-label={monthBannerOpen?'Collapse awareness items':'Expand awareness items'}>
                        <div className="month-banner-copy">
                          <div className="month-banner-label" style={{background:getEventColor(monthLongEvents[0]?.color)}}>This month</div>
                          <div className="month-banner-title">{monthBannerTitle}</div>
                        </div>
                        <div className="month-banner-meta">
                          {monthBannerRange&&<span>{monthBannerRange}</span>}
                          <span className={`month-banner-arrow ${monthBannerOpen?'open':''}`} aria-hidden="true">
                            <svg viewBox="0 0 18 18" fill="none"><path d="M5.2 7.2 L9 10.8 L12.8 7.2" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
                          </span>
                        </div>
                      </button>
                      <div className={`month-banner-details ${monthBannerOpen?'open':''}`}>
                        {monthLongEvents.length===1?(
                          <div className="month-banner-item single">
                            <div className="month-banner-item-copy">{monthLongEvents[0].desc}</div>
                          </div>
                        ):monthLongEvents.map((ev,i)=>(
                          <div key={i} className="month-banner-item">
                            <div className="month-banner-item-title"><span className="agenda-dot" style={{background:getEventColor(ev.color)}}/><span>{ev.title}</span></div>
                            <div className="agenda-tag">{ev.tag}</div>
                            <div className="month-banner-item-copy">{ev.desc}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="weekday-grid">{DAYS.map((d,i)=><div key={i} className="weekday">{d}</div>)}</div>
                  <div className="calendar-grid-wrap" ref={calendarGridRef}>
                    <div className="calendar-grid">
                      {calCells.map((cell,i)=>{
                        const isToday=cell.y===today.getFullYear()&&cell.m===today.getMonth()&&cell.d===today.getDate();
                        const isSel=cell.y===selectedDate.y&&cell.m===selectedDate.m&&cell.d===selectedDate.d;
                        const evts=VIC_EVENTS[dateKey(cell.y,cell.m,cell.d)]||[];
                        const hasEvent=evts.length>0;
                        return <div key={i} className={`day-cell ${cell.other?'other':''} ${isToday?'today':''} ${isSel?'selected':''}`} onMouseEnter={e=>showCalendarTooltip(hasEvent&&!cell.other?evts[0]:null,e.currentTarget)} onMouseLeave={()=>setCalendarTooltip(null)} onFocus={e=>showCalendarTooltip(hasEvent&&!cell.other?evts[0]:null,e.currentTarget)} onBlur={()=>setCalendarTooltip(null)} onClick={()=>selectCalendarDate(cell,hasEvent)}>
                          {cell.d}
                          {hasEvent&&!cell.other&&<span style={{position:'absolute',bottom:3,left:'50%',transform:'translateX(-50%)',width:4,height:4,borderRadius:'50%',background:isSel?'rgba(255,255,255,.74)':getEventColor(evts[0].color),opacity:isSel ? .86 : .64}}/>}
                        </div>;
                      })}
                    </div>
                    {calendarTooltip&&<div className={`calendar-tooltip ${calendarTooltip?'visible':''}`} style={{left:calendarTooltip.left,top:calendarTooltip.top}}>
                      <span className="calendar-tooltip-dot" style={{background:getEventColor(calendarTooltip.event.color)}}/>
                      <span className="calendar-tooltip-title">{calendarTooltip.event.title}</span>
                    </div>}
                  </div>
                </div>
                <div className={`drawer ${calendarOpen&&selectedEvent?'open':''}`}>
                  {selectedEvent&&<>
                    <div className="agenda-panel">
                      <div className="selected-day">
                        <div className="selected-day-main">
                          <div className="selected-day-number">{selectedDate.d}</div>
                          <div className="selected-day-label">
                            <div className="selected-day-weekday">{selWeekday}</div>
                            <div className="selected-day-month">{MONTHS[selectedDate.m]}</div>
                          </div>
                        </div>
                        <div className="selected-day-count">{selectedEvents.length} {selectedEvents.length===1?'event':'events'}</div>
                      </div>
                      {selectedEvents.map((ev,i)=><div key={i} className="agenda-item">
                        <div className="agenda-title">
                          <span className="agenda-dot" style={{background:getEventColor(ev.color)}}/>
                          <span className="agenda-title-text">{ev.title}</span>
                          {ev.url&&<a className="agenda-link" href={ev.url} target="_blank" rel="noreferrer" aria-label={`Open ${ev.title} website`} title="Open official page" onClick={e=>e.stopPropagation()}>
                            <svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M7.2 5.2H5.5C4.7 5.2 4 5.9 4 6.7v5.8c0 .8.7 1.5 1.5 1.5h5.8c.8 0 1.5-.7 1.5-1.5v-1.7" stroke="currentColor" strokeWidth="1.45" strokeLinecap="round"/><path d="M9.4 4H14v4.6M8.6 9.4L13.7 4.3" stroke="currentColor" strokeWidth="1.45" strokeLinecap="round" strokeLinejoin="round"/></svg>
                          </a>}
                        </div>
                        <div className="agenda-meta">
                          {[ev.tag,ev.scope].filter(Boolean).join(' · ')}
                        </div>
                        <div className="agenda-copy">{ev.summary||ev.desc}</div>
                        {ev.detail&&<div className="agenda-detail">{ev.detail}</div>}
                        {ev.theme&&<div className="agenda-theme">{ev.theme}</div>}
                      </div>)}
                    </div>
                  </>}
                </div>
                {selectedEvent&&<DrawerToggle open={calendarOpen} onClick={e=>{e.stopPropagation();setCalendarOpen(v=>!v);}}/>}
              </div>
            </div>
          </div>
        </>;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
