function nthWeekday(year, month, weekday, n) {
  if (n > 0) {
    let d = new Date(year, month, 1);
    while (d.getDay() !== weekday) d.setDate(d.getDate() + 1);
    d.setDate(d.getDate() + (n - 1) * 7);
    return d.getDate();
  } else {
    let d = new Date(year, month + 1, 0);
    while (d.getDay() !== weekday) d.setDate(d.getDate() - 1);
    return d.getDate();
  }
}

function getEaster(year) {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  return { month: Math.floor((h+l-7*m+114)/31)-1, day: ((h+l-7*m+114)%31)+1 };
}

function getDayObservances(year, month, day) {
  const events = [];
  const key = `${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  const easter = getEaster(year);
  const ed = new Date(year, easter.month, easter.day);
  const gf = new Date(ed); gf.setDate(ed.getDate()-2);
  const hs = new Date(ed); hs.setDate(ed.getDate()-1);
  const em = new Date(ed); em.setDate(ed.getDate()+1);
  if (month===gf.getMonth()&&day===gf.getDate()) events.push({label:"Good Friday",type:"public"});
  if (month===hs.getMonth()&&day===hs.getDate()) events.push({label:"Easter Saturday",type:"public"});
  if (month===ed.getMonth()&&day===ed.getDate()) events.push({label:"Easter Sunday",type:"public"});
  if (month===em.getMonth()&&day===em.getDate()) events.push({label:"Easter Monday",type:"public"});

    ],
  };
  const ay = ASTRONOMY[year] || [];
  ay.forEach(e => { if (month===e.m && day===e.d) events.push({label:e.label, type:"astronomy"}); });

  return events;
}

function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getFirstDow(y,m){return new Date(y,m,1).getDay();}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

  const weekObservances=[...new Map(
    Array.from({length:getDaysInMonth(vy,vm)},(_,i)=>i+1)
      .flatMap(d=>getDayObservances(vy,vm,d).filter(e=>e.weekLong))

        lastDay=new Date(d);
      } else if(firstDay) break;

    if(!firstDay) return "";
    const startStr = firstDay.getDate()+" "+MONTH_SHORT[firstDay.getMonth()];
    const endStr = lastDay.getDate()+" "+MONTH_SHORT[lastDay.getMonth()];

            display: "flex",
            alignItems: "flex-start",
            justifyContent: "space-between",
            position: "relative",
          }}>
            <div>
              <div style={{ fontSize:26, fontWeight:700, color:"#6a5560", letterSpacing:"-0.03em", lineHeight:1 }}>{MONTHS[vm]}</div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
              <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                {(vm!==tm||vy!==ty) && (
                  <button onClick={goToday} style={{ background:"rgba(255,255,255,0.7)", border:"1px solid rgba(160,130,170,0.45)", borderRadius:6, padding:"3px 8px", fontSize:9, fontWeight:500, color:"rgba(60,45,55,0.5)", cursor:"pointer", letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'Outfit',sans-serif'" }}>Today</button>
                )}
                {[prev,next].map((fn,i)=>(
                  <button key={i} onClick={fn} style={{ background:"rgba(255,255,255,0.6)", border:"1px solid rgba(160,130,170,0.4)", borderRadius:8, width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d={i===0?"M8 10 L4 6 L8 2":"M4 2 L8 6 L4 10"} stroke="rgba(60,45,55,0.5)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                ))}
              </div>
              <div style={{ fontSize:11, fontWeight:400, color:"rgba(60,45,55,0.4)", fontFamily:"'Outfit',sans-serif" }}>{vy}</div>
            </div>
          </div>

          {/* Month-long + week-long observances banner */}
          {(monthObservances.length > 0 || weekObservances.length > 0) && (
            <div style={{ padding:"10px 22px 0", display:"flex", flexDirection:"column", gap:5 }}>
              {/* Month-long */}
              {monthObservances.map((e,i)=>(
                <div key={`m-${i}`}>
                  <div
                    onClick={()=>setSelectedMonth(selectedMonth===e.label ? null : e.label)}
                    style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer" }}
                  >
                    <div style={{ width:4, height:4, borderRadius:"50%", background:TYPE_COLOURS[e.type], flexShrink:0 }}/>
                    <span style={{ fontSize:11, fontWeight:400, color:"rgba(60,45,55,0.45)", letterSpacing:"0.02em", flex:1 }}>{e.label}</span>
                    <svg style={{ flexShrink:0, transition:"transform 0.25s", transform: selectedMonth===e.label ? "rotate(180deg)" : "rotate(0deg)" }} width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 3.5 L5 6.5 L8 3.5" stroke="rgba(60,45,55,0.3)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                  {selectedMonth===e.label && EVENT_INFO[e.label] && (
                    <div style={{ fontSize:11, lineHeight:1.65, color:"rgba(60,45,55,0.55)", fontWeight:300, marginTop:6, paddingLeft:12, marginBottom:4, borderLeft:`2px solid ${TYPE_COLOURS[e.type]}`, animation:"fadeUp 0.2s ease both" }}>
                      {EVENT_INFO[e.label]}
                    </div>
                  )}
                </div>
              ))}
              {/* Week-long events with date range */}
              {weekObservances.map((e,i)=>(
                <div key={`w-${i}`}>
                  <div
                    onClick={()=>setSelectedMonth(selectedMonth===e.label ? null : e.label)}
                    style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer" }}
                  >
                    <div style={{ width:4, height:4, borderRadius:"50%", background:TYPE_COLOURS[e.type], flexShrink:0 }}/>
                    <span style={{ fontSize:11, fontWeight:400, color:"rgba(60,45,55,0.45)", letterSpacing:"0.02em", flex:1 }}>{e.label}</span>
                    <span style={{ fontSize:9.5, fontWeight:300, color:"rgba(60,45,55,0.32)", fontFamily:"'Outfit',sans-serif", letterSpacing:"0.01em", marginRight:4 }}>{getWeekEventRange(e.label)}</span>
                    <svg style={{ flexShrink:0, transition:"transform 0.25s", transform: selectedMonth===e.label ? "rotate(180deg)" : "rotate(0deg)" }} width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 3.5 L5 6.5 L8 3.5" stroke="rgba(60,45,55,0.3)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                  {selectedMonth===e.label && EVENT_INFO[e.label] && (
                    <div style={{ fontSize:11, lineHeight:1.65, color:"rgba(60,45,55,0.55)", fontWeight:300, marginTop:6, paddingLeft:12, marginBottom:4, borderLeft:`2px solid ${TYPE_COLOURS[e.type]}`, animation:"fadeUp 0.2s ease both" }}>
                      {EVENT_INFO[e.label]}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {/* Calendar body */}
          <div style={{ padding:"16px 18px 4px" }}>

            {/* Day labels */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:4 }}>
              {DAYS.map((d,i)=>(
                <div key={i} style={{ textAlign:"center", fontSize:10, fontWeight:500, color:"rgba(60,45,55,0.3)", letterSpacing:"0.06em", padding:"3px 0" }}>{d}</div>
              ))}
            </div>

            {/* Grid */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:1 }}>
              {cells.map((c,i)=>{
                const tod=isToday(c.year,c.month,c.day);
                const selected=isSel(c.year,c.month,c.day)&&!tod;
                const dot=!c.other&&hasDot(c.year,c.month,c.day);
                return (
                  <div key={i}
                    className={["day-cell", c.other?"other":"", tod?"today":"", selected?"selected":""].filter(Boolean).join(" ")}
                    onClick={()=>handleDayClick(c)}
                  >
                    {c.day}
                    {!c.other && (()=>{
                      const evts = getDayObservances(c.year,c.month,c.day).filter(e=>!e.monthLong);
                      if(!evts.length) return null;
                      const hex = TYPE_COLOURS[evts[0].type] || "#a08898";
                      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
                      return <div style={{ position:"absolute", bottom:2, left:"50%", transform:"translateX(-50%)", width:3, height:3, borderRadius:"50%", background: tod ? "rgba(255,255,255,0.9)" : `rgba(${r},${g},${b},0.38)` }}/>;
                    })()}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Arrow */}
          <div onClick={()=>setExpanded(e=>!e)} style={{ display:"flex", justifyContent:"center", alignItems:"center", padding:"8px 0 10px", cursor:"pointer" }}>
            <svg className={`arrow ${expanded?"open":""}`} width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M4.5 7 L9 11 L13.5 7" stroke="rgba(60,45,55,0.25)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>

          {/* Drawer */}
          <div className={`drawer ${expanded?"open":""}`}>
            <div style={{ borderTop:"1px solid rgba(160,130,170,0.25)", padding:"14px 22px 20px" }}>

              {/* Selected date */}
              <div style={{ fontSize:11, fontWeight:500, color:"rgba(60,45,55,0.4)", letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:12, fontFamily:"'Outfit',sans-serif'" }}>
                {weekday} · {ordinal(sel.d)} {MONTHS[sel.m]} {sel.y}
              </div>

              {observances.length > 0 ? (
                <div>
                  {observances.map((e,i)=>(
                    <div key={i} style={{ borderBottom: i < observances.length-1 ? "1px solid rgba(160,130,170,0.2)" : "none", animation:`fadeUp 0.2s ease ${i*0.06}s both` }}>
                      <div
                        onClick={()=>setSelectedEvent(selectedEvent===e.label ? null : e.label)}
                        style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 0", cursor:"pointer" }}
                      >
                        <div style={{ width:5, height:5, borderRadius:"50%", background:TYPE_COLOURS[e.type], flexShrink:0 }}/>
                        <span style={{ fontSize:12, fontWeight:400, color:"rgba(50,38,48,0.75)", flex:1, lineHeight:1.3 }}>{e.label}</span>
                        <span style={{ fontSize:9, fontWeight:400, color:"rgba(60,45,55,0.3)", letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'Outfit',sans-serif'" }}>{e.type}</span>
                        <svg style={{ flexShrink:0, transition:"transform 0.25s", transform: selectedEvent===e.label ? "rotate(180deg)" : "rotate(0deg)" }} width="12" height="12" viewBox="0 0 12 12" fill="none">
                          <path d="M3 4.5 L6 7.5 L9 4.5" stroke="rgba(60,45,55,0.3)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </div>
                      {selectedEvent===e.label && EVENT_INFO[e.label] && (
                        <div style={{
                          fontSize:11.5, lineHeight:1.65, color:"rgba(60,45,55,0.6)", fontWeight:300,
                          padding:"0 0 10px 15px",
                          animation:"fadeUp 0.2s ease both",
                          borderLeft:`2px solid ${TYPE_COLOURS[e.type]}`,
                          marginLeft:2, paddingLeft:12,
                          marginBottom:4,
                        }}>
                          {EVENT_INFO[e.label]}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ fontSize:12, color:"rgba(60,45,55,0.3)", fontWeight:300, textAlign:"center", padding:"8px 0" }}>Nothing on this day</div>
              )}

            </div>
          </div>

        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
