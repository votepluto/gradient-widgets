<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melbourne · Weather</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #e8e0f8 0%, #f5f0fb 40%, #fdf0ea 70%, #fff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
    }

    .drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      opacity: 0;
    }
    .drawer.open {
      max-height: 200px;
      opacity: 1;
    }
    .arrow {
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      display: block;
    }
    .arrow.open {
      transform: rotate(180deg);
    }
    .stat-pill {
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 14px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .drawer.open .stat-pill              { opacity: 1; transform: translateY(0); }
    .drawer.open .stat-pill:nth-child(1) { transition-delay: 0.06s; }
    .drawer.open .stat-pill:nth-child(2) { transition-delay: 0.11s; }
    .drawer.open .stat-pill:nth-child(3) { transition-delay: 0.16s; }
    .drawer.open .stat-pill:nth-child(4) { transition-delay: 0.21s; }
    .drawer.open .stat-pill:nth-child(5) { transition-delay: 0.26s; }
    .drawer.open .stat-pill:nth-child(6) { transition-delay: 0.31s; }
    .stat-pill .pill-label {
      font-size: 8.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
    }
    .stat-pill .pill-value {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: -0.01em;
      line-height: 1;
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WMO = {
      0: ["Clear","clear"], 1: ["Mostly Clear","clear"], 2: ["Partly Cloudy","cloudy"],
      3: ["Overcast","cloudy"], 45: ["Foggy","fog"], 48: ["Icy Fog","fog"],
      51: ["Light Drizzle","drizzle"], 53: ["Drizzle","drizzle"], 55: ["Heavy Drizzle","drizzle"],
      61: ["Light Rain","rain"], 63: ["Rain","rain"], 65: ["Heavy Rain","rain"],
      71: ["Light Snow","snow"], 73: ["Snow","snow"], 75: ["Heavy Snow","snow"],
      80: ["Showers","rain"], 81: ["Rain Showers","rain"], 82: ["Heavy Showers","rain"],
      95: ["Thunderstorm","storm"], 99: ["Hail Storm","storm"],
    };

    const NAMED_MOONS = {
      0: "Wolf Moon", 1: "Snow Moon", 2: "Worm Moon", 3: "Pink Moon",
      4: "Flower Moon", 5: "Strawberry Moon", 6: "Buck Moon", 7: "Sturgeon Moon",
      8: "Harvest Moon", 9: "Hunter's Moon", 10: "Beaver Moon", 11: "Cold Moon",
    };

    function getMoonPhase(date = new Date()) {
      const known = new Date(2000, 0, 6, 18, 14, 0);
      const days = (date - known) / 86400000;
      const cycle = 29.53058867;
      const pct = ((days % cycle) + cycle) % cycle / cycle;
      if (pct < 0.025 || pct > 0.975) return { name: "New Moon",        icon: "new",             pct };
      if (pct < 0.25)                  return { name: "Waxing Crescent", icon: "waxing-crescent", pct };
      if (pct < 0.275)                 return { name: "First Quarter",   icon: "first-quarter",   pct };
      if (pct < 0.475)                 return { name: "Waxing Gibbous",  icon: "waxing-gibbous",  pct };
      if (pct < 0.525)                 return { name: "Full Moon", namedMoon: NAMED_MOONS[date.getMonth()], icon: "full",            pct };
      if (pct < 0.725)                 return { name: "Waning Gibbous",  icon: "waning-gibbous",  pct };
      if (pct < 0.775)                 return { name: "Last Quarter",    icon: "last-quarter",    pct };
      return                                  { name: "Waning Crescent", icon: "waning-crescent", pct };
    }

    function MoonSVG({ icon, size = 24 }) {
      const r = size / 2, s = size;
      const lit = "rgba(255,255,255,0.9)", dark = "rgba(255,255,255,0.12)", rim = "rgba(255,255,255,0.25)";
      const shapes = {
        "new":             <circle cx={r} cy={r} r={r-1} fill={dark} stroke={rim} strokeWidth="1"/>,
        "full":            <circle cx={r} cy={r} r={r-1} fill={lit}/>,
        "first-quarter":   <><circle cx={r} cy={r} r={r-1} fill={dark} stroke={rim} strokeWidth="1"/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 1 ${r} ${s-1}`} fill={lit}/></>,
        "last-quarter":    <><circle cx={r} cy={r} r={r-1} fill={dark} stroke={rim} strokeWidth="1"/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 0 ${r} ${s-1}`} fill={lit}/></>,
        "waxing-crescent": <><circle cx={r} cy={r} r={r-1} fill={dark} stroke={rim} strokeWidth="1"/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 1 ${r} ${s-1} A${r*.5} ${r-1} 0 0 0 ${r} 1`} fill={lit}/></>,
        "waxing-gibbous":  <><circle cx={r} cy={r} r={r-1} fill={lit}/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 0 ${r} ${s-1} A${r*.5} ${r-1} 0 0 1 ${r} 1`} fill={dark}/></>,
        "waning-gibbous":  <><circle cx={r} cy={r} r={r-1} fill={lit}/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 1 ${r} ${s-1} A${r*.5} ${r-1} 0 0 0 ${r} 1`} fill={dark}/></>,
        "waning-crescent": <><circle cx={r} cy={r} r={r-1} fill={dark} stroke={rim} strokeWidth="1"/><path d={`M${r} 1 A${r-1} ${r-1} 0 0 0 ${r} ${s-1} A${r*.5} ${r-1} 0 0 1 ${r} 1`} fill={lit}/></>,
      };
      return <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>{shapes[icon] || shapes["new"]}</svg>;
    }

    function WeatherIcon({ type, size = 26 }) {
      const c = "rgba(255,255,255,0.85)";
      if (type === "clear") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="7.5" fill="none" stroke={c} strokeWidth="1.8"/>
          {[0,45,90,135,180,225,270,315].map((d,i) => {
            const x = Math.cos(d*Math.PI/180), y = Math.sin(d*Math.PI/180);
            return <line key={i} x1={20+11*x} y1={20+11*y} x2={20+15*x} y2={20+15*y} stroke={c} strokeWidth="1.8" strokeLinecap="round"/>;
          })}
        </svg>
      );
      if (type === "cloudy") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <circle cx="15" cy="18" r="5" fill="none" stroke={c} strokeWidth="1.8"/>
          <path d="M8 27 Q8 20 17 20 Q19 13 27 13 Q35 13 35 21 Q39 21 39 27 Z" fill="none" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
        </svg>
      );
      if (type === "rain" || type === "drizzle") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M5 21 Q5 14 14 14 Q15 8 23 8 Q31 8 31 16 Q37 16 37 21 Z" fill="none" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
          <line x1="13" y1="26" x2="10" y2="33" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
          <line x1="21" y1="26" x2="18" y2="33" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
          <line x1="29" y1="26" x2="26" y2="33" stroke={c} strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
      );
      if (type === "snow") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M5 20 Q5 13 14 13 Q15 7 23 7 Q31 7 31 15 Q37 15 37 20 Z" fill="none" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
          {[11,20,29].map(x => <g key={x}><circle cx={x} cy="27" r="1.8" fill={c}/><circle cx={x} cy="33" r="1.8" fill={c}/></g>)}
        </svg>
      );
      if (type === "storm") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M5 20 Q5 13 14 13 Q15 7 23 7 Q31 7 31 15 Q37 15 37 20 Z" fill="none" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>
          <path d="M23 22 L18 30 L23 30 L18 38" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        </svg>
      );
      return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          {[11,18,25,32].map(y => <line key={y} x1="5" y1={y} x2="35" y2={y} stroke={c} strokeWidth="1.8" strokeLinecap="round" opacity={y===11||y===32?0.35:0.75}/>)}
        </svg>
      );
    }

    function getTime() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-AU", {
        hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Australia/Melbourne"
      }).formatToParts(now);
      return {
        h:    parts.find(p => p.type === "hour")?.value || "00",
        m:    parts.find(p => p.type === "minute")?.value || "00",
        date: now.toLocaleDateString("en-AU", { weekday: "long", day: "numeric", month: "long", timeZone: "Australia/Melbourne" }),
      };
    }

    function App() {
      const [time, setTime]         = useState(getTime);
      const [expanded, setExpanded] = useState(false);
      const [weather, setWeather]   = useState({ temp: null, label: "…", type: "clear", feels: null, humidity: null, wind: null, uv: null });
      const moon = getMoonPhase();

      useEffect(() => {
        const id = setInterval(() => setTime(getTime()), 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        fetch("https://api.open-meteo.com/v1/forecast?latitude=-37.8136&longitude=144.9631&current=temperature_2m,weather_code,apparent_temperature,relative_humidity_2m,wind_speed_10m,uv_index")
          .then(r => r.json())
          .then(data => {
            const c = data.current;
            const [label, type] = WMO[c.weather_code] || ["Unknown", "clear"];
            setWeather({
              temp: Math.round(c.temperature_2m),
              feels: Math.round(c.apparent_temperature),
              humidity: Math.round(c.relative_humidity_2m),
              wind: Math.round(c.wind_speed_10m),
              uv: c.uv_index?.toFixed(1) ?? "—",
              label, type,
            });
          })
          .catch(() => {});
      }, []);

      return (
        <div style={{
          width: 440,
          borderRadius: 32,
          background: "linear-gradient(140deg, #c8cbf0 0%, #d4b8e0 40%, #e8c4a8 75%, #f0c898 100%)",
          boxShadow: "0 32px 64px rgba(180,160,220,0.35), 0 8px 24px rgba(220,180,160,0.2), inset 0 1px 0 rgba(255,255,255,0.45)",
          overflow: "hidden",
          position: "relative",
          border: "1px solid rgba(255,255,255,0.4)",
        }}>

          {/* Sheen */}
          <div style={{
            position: "absolute", inset: 0, borderRadius: 32,
            background: "linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.04) 45%, transparent 70%)",
            pointerEvents: "none", zIndex: 1,
          }}/>

          {/* Main bar */}
          <div style={{ padding: "22px 26px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "relative", zIndex: 2 }}>

            {/* Left — time + location */}
            <div>
              <div style={{ lineHeight: 1, marginBottom: 5 }}>
                <span style={{ color: "rgba(255,255,255,0.95)", fontSize: 62, fontWeight: 600, letterSpacing: "-0.03em" }}>
                  {time.h}:{time.m}
                </span>
              </div>
              <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 11, fontWeight: 300, letterSpacing: "0.04em", fontFamily: "'DM Mono', monospace" }}>
                Melbourne · {time.date}
              </div>
            </div>

            {/* Right — weather + divider + moon */}
            <div style={{ display: "flex", gap: 20, alignItems: "center" }}>

              <div style={{ textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center" }}>
                  <WeatherIcon type={weather.type} size={26}/>
                </div>
                <div style={{ color: "rgba(255,255,255,0.95)", fontSize: 28, fontWeight: 500, letterSpacing: "-0.02em", lineHeight: 1, marginTop: 5 }}>
                  {weather.temp !== null ? `${weather.temp}°` : "—"}
                </div>
                <div style={{ color: "rgba(255,255,255,0.55)", fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", marginTop: 2 }}>
                  {weather.label}
                </div>
              </div>

              <div style={{ width: 1, height: 52, background: "rgba(255,255,255,0.2)" }}/>

              <div style={{ textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 5 }}>
                  <MoonSVG icon={moon.icon} size={24}/>
                </div>
                <div style={{ color: "rgba(255,255,255,0.95)", fontSize: 11, fontWeight: 500, letterSpacing: "0.02em", lineHeight: 1.3 }}>
                  {moon.name}
                </div>
              </div>

            </div>
          </div>

          {/* Drawer */}
          <div className={`drawer ${expanded ? "open" : ""}`} style={{ position: "relative", zIndex: 2 }}>
            <div style={{ margin: "0 26px", height: 1, background: "rgba(255,255,255,0.15)" }}/>
            <div style={{ padding: "16px 26px 20px", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
              {[
                ["Feels Like", weather.feels !== null ? `${weather.feels}°` : "—"],
                ["Humidity",   weather.humidity !== null ? `${weather.humidity}%` : "—"],
                ["Wind",       weather.wind !== null ? `${weather.wind} km/h` : "—"],
                ["UV Index",   weather.uv ?? "—"],
                ["Moon Name",  moon.namedMoon ?? moon.name],
                ["Condition",  weather.label || "—"],
              ].map(([label, value]) => (
                <div key={label} className="stat-pill">
                  <div className="pill-label">{label}</div>
                  <div className="pill-value">{value}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Arrow */}
          <div
            onClick={() => setExpanded(e => !e)}
            style={{ position: "relative", zIndex: 2, display: "flex", justifyContent: "center", padding: "4px 0 12px", cursor: "pointer" }}
          >
            <svg className={`arrow ${expanded ? "open" : ""}`} width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M6 8.5 L11 13.5 L16 8.5" stroke="rgba(255,255,255,0.5)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
