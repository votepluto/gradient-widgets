    .day-cell.today::before { content:""; position:absolute; width:145%; height:145%; border-radius:50%; background:radial-gradient(circle, rgba(180,160,220,.18), transparent 64%); z-index:-1; pointer-events:none; }

    .agenda-copy { margin-left:14px; margin-top:2px; max-width:248px; font-size:13px; line-height:1.5; color:rgba(60,49,69,.48); }
    .toggle-row { position:relative; z-index:1; display:flex; justify-content:center; padding:3px 0 7px; border-top:1px solid rgba(170,170,188,.07); background:rgba(255,255,255,.32); }
    .toggle-btn { width:18px; height:14px; display:inline-flex; align-items:center; justify-content:center; border:none; background:transparent; cursor:pointer; opacity:.6; transition:opacity .2s ease, transform .2s ease; }
    .toggle-btn:hover { opacity:1; transform:translateY(-1px); }
    .ripple-wave { position:absolute; border-radius:0; width:80px; height:80px; background:rgba(190,170,220,.09); transform:scale(0); animation:ripple .7s ease-out forwards; pointer-events:none; margin-left:-40px; margin-top:-40px; }

  </style>

      { date:"2026-11-08", title:"Diwali", tag:"Cultural", color:"cultural", desc:"A major festival of lights observed across Hindu, Sikh, Jain and other traditions, symbolising light over darkness." },
      { date:"2026-11-11", title:"Remembrance Day", tag:"Commemoration", color:"commemoration", desc:"Observed on 11 November, marking the armistice that ended fighting in World War I and honouring those who served." },
      { start:"2026-11-25", end:"2026-12-10", title:"16 Days of Activism", tag:"Awareness", color:"awareness", desc:"A global campaign calling for action to prevent and respond to gender-based violence." },
      { start:"2026-12-01", end:"2026-12-25", title:"Christmas", tag:"Cultural", color:"cultural", desc:"A season leading to Christmas Day, observed through Christian traditions and wider community celebrations." },
      { date:"2026-12-03", title:"International Day of People with Disability", tag:"Awareness", color:"awareness", desc:"Promotes the rights, inclusion, and leadership of people with disability." },
      { date:"2026-12-25", title:"Christmas Day", tag:"Public Holiday", color:"holiday", desc:"Observed in Christianity to mark the birth of Jesus, and widely recognised as a public holiday centred on family, giving, and community." },
      { date:"2026-12-26", title:"Boxing Day", tag:"Public Holiday", color:"holiday", desc:"Observed the day after Christmas; historically linked to giving boxes, gifts, or charity to workers and people in need." }
    ];
    const EVENT_ENTRIES_CLEAN = EVENT_ENTRIES.filter(e => e.tag !== 'Community' && e.color !== 'community');

    const state = { weatherOpen:false, astroOpen:false, calendarOpen:false, monthBannerOpen:false, viewYear:new Date().getFullYear(), viewMonth:new Date().getMonth(), selectedDate:null, weather:{temp:null,label:'…',type:'clear',feels:null,wind:null,windDir:null,rainProb:null,sunset:null,high:null,low:null,nextHourTemp:null} };

    function pad2(n){ return String(n).padStart(2,'0'); }
    function parseDateOnly(value){ const [y,m,d] = value.split('-').map(Number); return new Date(y,m-1,d); }
    function dateKey(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
    function expandEvents(entries){ const events={}; entries.forEach(entry=>{ if(entry.banner) return; const start=parseDateOnly(entry.start||entry.date); const end=parseDateOnly(entry.end||entry.date); for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){ const key=dateKey(d.getFullYear(),d.getMonth(),d.getDate()); events[key] ||= []; events[key].push(entry); } }); return events; }
    const VIC_EVENTS = expandEvents(EVENT_ENTRIES_CLEAN);
    const MONTH_BANNER_EVENTS = EVENT_ENTRIES_CLEAN.filter(e=>e.banner);
    function getEventsForDate(sel){ return VIC_EVENTS[dateKey(sel.y, sel.m, sel.d)] || []; }
    function getMonthBannerEvents(year,month){ const seen=new Set(); return MONTH_BANNER_EVENTS.filter(event=>{ const start=parseDateOnly(event.start||event.date); const end=parseDateOnly(event.end||event.date); const monthStart=new Date(year,month,1); const monthEnd=new Date(year,month+1,0); const ok=start<=monthEnd && end>=monthStart; if(!ok || seen.has(event.title)) return false; seen.add(event.title); return true; }); }
    function getEventColor(type){ return ({holiday:'rgba(160,140,190,0.55)',vic:'rgba(140,170,200,0.55)',commemoration:'rgba(170,150,160,0.55)',firstnations:'rgba(170,120,90,0.55)',cultural:'rgba(190,145,180,0.50)',awareness:'rgba(150,170,205,0.52)',global:'rgba(155,150,200,0.52)'})[type] || 'rgba(120,105,145,0.45)'; }
    function normaliseDegrees(deg){ return ((deg%360)+360)%360; }
    function sinDeg(deg){ return Math.sin(deg*Math.PI/180); }
    function getMoonLongitude(date=new Date()){ const d=(date.getTime()-Date.UTC(2000,0,1,12,0,0))/86400000; const L=normaliseDegrees(218.316+13.176396*d); const M=normaliseDegrees(134.963+13.064993*d); const D=normaliseDegrees(297.850+12.190749*d); const F=normaliseDegrees(93.272+13.229350*d); const Ms=normaliseDegrees(357.529+.98560028*d); return normaliseDegrees(L+6.289*sinDeg(M)+1.274*sinDeg(2*D-M)+.658*sinDeg(2*D)+.214*sinDeg(2*M)-.186*sinDeg(Ms)-.114*sinDeg(2*F)); }
    function getMoonSign(date=new Date()){ return ZODIAC_SIGNS[Math.floor(getMoonLongitude(date)/30)]; }
    function getMelbourneDateParts(date=new Date()){ const parts=new Intl.DateTimeFormat('en-AU',{timeZone:'Australia/Melbourne',year:'numeric',month:'numeric',day:'numeric'}).formatToParts(date); const get=t=>Number(parts.find(p=>p.type===t)?.value||0); return {year:get('year'), month:get('month')-1, day:get('day')}; }
    function getSouthernNamedMoon(date=new Date()){ return SOUTHERN_NAMED_MOONS[getMelbourneDateParts(date).month]; }
    function getMoonPhase(date=new Date()){ const known=Date.UTC(2000,0,6,18,14,0); const pct=(((date.getTime()-known)/86400000)%29.53058867+29.53058867)%29.53058867/29.53058867; if(pct<.025||pct>.975)return 'New Moon'; if(pct<.25)return 'Waxing Crescent'; if(pct<.275)return 'First Quarter'; if(pct<.475)return 'Waxing Gibbous'; if(pct<.525)return 'Full Moon'; if(pct<.725)return 'Waning Gibbous'; if(pct<.775)return 'Last Quarter'; return 'Waning Crescent'; }
    function getTime(){ const now=new Date(); const parts=new Intl.DateTimeFormat('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:'Australia/Melbourne'}).formatToParts(now); const get=t=>parts.find(p=>p.type===t)?.value||'00'; return {h:get('hour'),m:get('minute'),s:get('second'),date:now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',timeZone:'Australia/Melbourne'})}; }
    function safeRound(v){ return v==null || Number.isNaN(Number(v)) ? null : Math.round(Number(v)); }
    function degToCompass(deg){ if(deg==null) return ''; return ['N','NE','E','SE','S','SW','W','NW'][Math.round(Number(deg)/45)%8]; }
    function windDescription(speed){ if(speed==null) return '—'; if(speed<6)return 'Calm'; if(speed<20)return 'Light breeze'; if(speed<39)return 'Breezy'; return 'Windy'; }
    function sunsetCountdown(sunset){ if(!sunset)return '—'; const diff=new Date(sunset)-new Date(); if(diff<=0)return 'Passed'; const mins=Math.floor(diff/60000); const h=Math.floor(mins/60), m=mins%60; return h<=0?`in ${m}m`:`in ${h}h ${m}m`; }
    function ordinal(n){ const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
    function getDailySuggestion(phase){ const sets={waxing:['Start something small','Reach out to someone','Take one step forward','Plan the next move'],new:['Write intentions','Reset your space','Sketch a fresh idea','Set a simple goal'],full:['Make a decision','Share your work','Celebrate a win','Close a loop'],waning:['Declutter a small space','Journal what to release','Wrap up loose ends','Take a quiet walk']}; const key=phase.includes('Waxing')?'waxing':phase.includes('New')?'new':phase.includes('Full')?'full':'waning'; const d=new Date(); return sets[key][(d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())%sets[key].length]; }
    function weatherSvg(type){ const cloud = '<defs><filter id="s" x="-70%" y="-70%" width="240%" height="240%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#aeb9cf" flood-opacity="0.28"/></filter><radialGradient id="c" cx="36%" cy="22%" r="78%"><stop offset="0%" stop-color="#fff"/><stop offset="56%" stop-color="#f8fbff"/><stop offset="100%" stop-color="#e5edf8"/></radialGradient></defs><g filter="url(#s)"><path d="M17.5 43.5 C11.2 43.5 7.6 40.1 7.6 35.3 C7.6 30.4 11.2 27.2 16.5 27.2 C18.4 19.7 24.1 15.7 31.9 15.7 C39.4 15.7 44.9 20.2 46.3 27.1 C52.2 27.3 56.4 30.9 56.4 36.1 C56.4 41.0 52.6 44.4 46.5 44.4 H17.5Z" fill="url(#c)"/></g>'; if(type==='clear') return '<svg width="70" height="70" viewBox="0 0 64 64"><defs><radialGradient id="sun" cx="38%" cy="30%" r="72%"><stop offset="0%" stop-color="#fff8bf"/><stop offset="55%" stop-color="#ffd83a"/><stop offset="100%" stop-color="#ff7b58"/></radialGradient></defs><circle cx="32" cy="32" r="17" fill="rgba(255,205,70,.16)"/><circle cx="32" cy="32" r="13" fill="url(#sun)"/></svg>'; let extra=''; if(type==='rain') extra='<rect x="20" y="46" width="5" height="13" rx="2.5" fill="#54d8f8"/><rect x="33" y="46" width="5" height="15" rx="2.5" fill="#54d8f8"/>'; if(type==='storm') extra='<path d="M31.5 42 L25.5 52.2 H31.5 L29.4 62 L40.1 48.2 H33.6 L37 42 Z" fill="#35d8f6"/>'; return `<svg width="70" height="70" viewBox="0 0 64 64">${cloud}${extra}</svg>`; }

    function toggle(name){ state[name]=!state[name]; render(); }
    function closeAll(){ state.weatherOpen=false; state.astroOpen=false; state.calendarOpen=false; state.monthBannerOpen=false; render(); }

    function render(){
      const app=document.getElementById('app'); const t=getTime(); const today=new Date(); const todayParts=getMelbourneDateParts(today); const moonPhase=getMoonPhase(today); const moonName=getSouthernNamedMoon(today); const moonSign=getMoonSign(today); const banners=getMonthBannerEvents(state.viewYear,state.viewMonth); const primaryBanner=banners[0]; const selected=state.selectedDate || {y:todayParts.year,m:todayParts.month,d:todayParts.day}; const selectedEvents=getEventsForDate(selected); const selectedEvent=selectedEvents[0];
      const first=new Date(state.viewYear,state.viewMonth,1).getDay(); const dim=new Date(state.viewYear,state.viewMonth+1,0).getDate(); const prevDim=new Date(state.viewYear,state.viewMonth,0).getDate(); const cells=[]; for(let i=first-1;i>=0;i--){const d=prevDim-i,dt=new Date(state.viewYear,state.viewMonth-1,d);cells.push({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate(),other:true});} for(let d=1;d<=dim;d++)cells.push({y:state.viewYear,m:state.viewMonth,d,other:false}); while(cells.length<42){const d=cells.length-first-dim+1,dt=new Date(state.viewYear,state.viewMonth+1,d);cells.push({y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate(),other:true});}
      const selectedWeekday=new Date(selected.y,selected.m,selected.d).toLocaleDateString('en-AU',{weekday:'long'});
      app.innerHTML = `
        <div class="card-shell pair-top"><div class="card time-card"><div class="time-line"><div class="time-main"><span class="time-main-pop">${t.h}<span class="time-colon">:</span>${t.m}</span></div><div class="time-seconds">${t.s}</div></div><div class="date-line">${t.date}</div></div></div>
        <div class="card-shell pair-bottom"><div class="card weather-card" id="weather-card"><div class="section-main"><div class="weather-row"><div><div class="eyebrow">Weather</div><div class="weather-temp-line"><div class="weather-temp">${state.weather.temp!==null?state.weather.temp+'°':'—'}</div><div class="weather-label">${state.weather.label}</div></div></div><div class="weather-icon-wrap">${weatherSvg(state.weather.type)}</div></div></div><div class="drawer ${state.weatherOpen?'open':''}"><div class="weather-summary"><div class="summary-hero"><div class="summary-label">Feels Like</div><div class="summary-hero-line"><div class="summary-main-value">${state.weather.feels!==null?state.weather.feels+'°':'—'}</div><div class="summary-note">${state.weather.high!==null&&state.weather.low!==null?`High ${state.weather.high}° · Low ${state.weather.low}°`:'Today'}</div></div></div><div class="summary-list">${[{label:'Sunset',value:state.weather.sunset?`${sunsetCountdown(state.weather.sunset)} · ${new Date(state.weather.sunset).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`:'—'},{label:'Next Hour',value:state.weather.nextHourTemp!==null?state.weather.nextHourTemp+'°':'—'},{label:'Rain Chance',value:state.weather.rainProb!=null?state.weather.rainProb+'%':'—'},{label:'Wind',value:state.weather.wind!=null?`${windDescription(state.weather.wind)} · ${degToCompass(state.weather.windDir)}`:'—'}].map(x=>`<div class="summary-row"><div class="summary-row-label">${x.label}</div><div class="summary-row-value">${x.value}</div></div>`).join('')}</div></div></div><div class="toggle-row"><button class="toggle-btn" data-toggle="weatherOpen"><svg class="arrow ${state.weatherOpen?'open':''}" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 7 L9 11 L13.5 7" stroke="rgba(88,74,98,.46)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div></div>
        <div class="card-shell"><div class="card astro-card"><div class="section-main"><div class="astro-row"><div><div class="eyebrow">Lunar</div><div class="astro-main">${moonPhase}</div><div class="astro-sub">${moonName} · Moon in ${moonSign}</div></div><div class="astro-orb"></div></div></div><div class="drawer ${state.astroOpen?'open':''}"><div class="lunar-guide"><div class="lunar-guide-hero"><div class="lunar-guide-label">Lunar Guide</div><div class="lunar-guide-title">${moonName}</div><div class="lunar-guide-copy">${moonName==='Beaver Moon'?'Traditionally linked with preparation and protection — a cue to organise, secure, and get things in place.':'A seasonal moon marker connected to nature cycles, reflection, and timing.'}</div></div><div class="lunar-note-list"><div class="lunar-note"><div class="lunar-note-title">Moon in ${moonSign}</div><div class="lunar-note-copy">${moonSign==='Sagittarius'?'The emotional tone leans toward perspective, learning, truth-seeking, and looking ahead.':'The Moon sign describes the current emotional tone and where attention naturally gathers.'}</div></div><div class="lunar-note"><div class="lunar-note-title">Good for</div><div class="lunar-note-copy">${moonPhase.includes('Waning')?'Reflecting, wrapping things up, and releasing what no longer needs your energy.':moonPhase.includes('Waxing')?'Starting small, building momentum, and feeding what you want to grow.':moonPhase.includes('Full')?'Clarity, decisions, completion, and noticing what has come to light.':'Setting intentions, resetting gently, and choosing what you want to begin.'}</div></div></div></div></div><div class="toggle-row"><button class="toggle-btn" data-toggle="astroOpen"><svg class="arrow ${state.astroOpen?'open':''}" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 7 L9 11 L13.5 7" stroke="rgba(88,74,98,.46)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div></div>
        <div class="card-shell"><div class="card calendar-card"><div class="section-main"><div class="calendar-header"><div><div class="eyebrow">Calendar</div><div class="calendar-title">${MONTHS[state.viewMonth]}</div><div class="calendar-year">${state.viewYear}</div></div><div class="calendar-controls"><button class="calendar-btn" id="prev-month">‹</button><button class="calendar-btn" id="next-month">›</button></div></div>${primaryBanner?`<div class="month-banner ${state.monthBannerOpen?'open':''}" id="month-banner"><div class="month-banner-top"><div class="month-banner-title"><span class="dot" style="background:${getEventColor(primaryBanner.color)}"></span><span>${primaryBanner.title}</span></div><svg class="month-banner-arrow ${state.monthBannerOpen?'open':''}" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 7 L9 11 L13.5 7" stroke="rgba(88,74,98,.46)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div><div class="drawer ${state.monthBannerOpen?'open':''}"><div class="weather-summary calendar-event-summary">${banners.map(e=>`<div class="agenda-item"><div class="agenda-tag" style="margin-left:0;margin-bottom:8px">${e.tag}</div><div class="agenda-copy" style="margin-left:0">${e.desc}</div></div>`).join('')}</div></div>`:''}<div class="weekday-grid">${DAYS.map(d=>`<div class="weekday">${d}</div>`).join('')}</div><div class="calendar-grid">${cells.map((cell,i)=>{ const isToday=cell.y===todayParts.year&&cell.m===todayParts.month&&cell.d===todayParts.day; const isSelected=cell.y===selected.y&&cell.m===selected.m&&cell.d===selected.d; const events=getEventsForDate(cell); const event=events[0]; return `<div class="day-cell ${cell.other?'other':''} ${isToday?'today':''} ${isSelected?'selected':''} ${events.length?'has-event':''}" data-date="${cell.y}-${cell.m}-${cell.d}">${cell.d}${event?`<span class="event-dot" style="background:${getEventColor(event.color)}"></span><div class="event-tooltip"><div class="event-tooltip-title">${event.title}</div><div class="event-tooltip-tag">${events.length>1?events.length+' events':event.tag}</div></div>`:''}</div>`; }).join('')}</div></div><div class="drawer ${state.calendarOpen&&selectedEvent?'open':''}">${selectedEvent?`<div class="weather-summary calendar-event-summary"><div class="agenda-header">${selectedWeekday} · ${ordinal(selected.d)} ${MONTHS[selected.m]} ${selected.y}</div>${selectedEvents.map(e=>`<div class="agenda-item"><div class="agenda-title-row"><div class="agenda-title"><span class="agenda-dot" style="background:${getEventColor(e.color)}"></span><span>${e.title}</span></div><div class="agenda-tag">${e.tag}</div></div><div class="agenda-copy">${e.desc}</div></div>`).join('')}</div>`:''}</div>${selectedEvent?`<div class="toggle-row"><button class="toggle-btn" data-toggle="calendarOpen"><svg class="arrow ${state.calendarOpen?'open':''}" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 7 L9 11 L13.5 7" stroke="rgba(88,74,98,.46)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div>`:''}</div></div>`;
      bindEvents();
    }
    function bindEvents(){ document.querySelectorAll('[data-toggle]').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation(); toggle(btn.dataset.toggle); })); const prev=document.getElementById('prev-month'); if(prev) prev.onclick=e=>{e.stopPropagation(); state.monthBannerOpen=false; if(state.viewMonth===0){state.viewMonth=11;state.viewYear--;}else state.viewMonth--; render();}; const next=document.getElementById('next-month'); if(next) next.onclick=e=>{e.stopPropagation(); state.monthBannerOpen=false; if(state.viewMonth===11){state.viewMonth=0;state.viewYear++;}else state.viewMonth++; render();}; const banner=document.getElementById('month-banner'); if(banner) banner.onclick=e=>{e.stopPropagation(); state.monthBannerOpen=!state.monthBannerOpen; render();}; document.querySelectorAll('.day-cell').forEach(cell=>cell.onclick=e=>{e.stopPropagation(); const [y,m,d]=cell.dataset.date.split('-').map(Number); state.selectedDate={y,m,d}; state.calendarOpen=getEventsForDate(state.selectedDate).length>0; render();}); }
    async function loadWeather(){ try{ const url='https://api.open-meteo.com/v1/forecast?latitude=-37.8136&longitude=144.9631&current=temperature_2m,weather_code,apparent_temperature,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=Australia%2FMelbourne'; const data=await fetch(url).then(r=>r.json()); const c=data.current||{}; const [label,type]=WMO[c.weather_code]||['Unavailable','clear']; state.weather={temp:safeRound(c.temperature_2m),feels:safeRound(c.apparent_temperature),wind:safeRound(c.wind_speed_10m),windDir:c.wind_direction_10m??null,rainProb:data.hourly?.precipitation_probability?.[0]??null,sunset:data.daily?.sunset?.[0]??null,high:safeRound(data.daily?.temperature_2m_max?.[0]),low:safeRound(data.daily?.temperature_2m_min?.[0]),nextHourTemp:safeRound(data.hourly?.temperature_2m?.[1]),label,type}; render(); }catch(e){ console.warn('Weather unavailable',e); state.weather.label='Unavailable'; render(); } }
    document.addEventListener('click',e=>{ if(!e.target.closest('.card')) closeAll(); });
    setInterval(render,1000); render(); loadWeather();
  </script>
