<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melbourne · Nav</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Outfit', sans-serif;
    }

    /* Demo page background — remove this if embedding */
    .demo-bg {
      min-height: 100vh;
      background: radial-gradient(ellipse at 60% 80%, #e8e0f8 0%, #f5f0fb 40%, #fdf0ea 70%, #fff 100%);
    }

    #nav-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }

    .nav-inner {
      background: linear-gradient(100deg, #c8cbf0 0%, #d4b8e0 40%, #e8c4a8 75%, #f0c898 100%);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 4px 24px rgba(180,160,220,0.25), 0 1px 0 rgba(255,255,255,0.4) inset;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    /* Sheen */
    .nav-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      pointer-events: none;
    }

    /* Main slim bar */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 48px;
      position: relative;
      z-index: 1;
      cursor: pointer;
      user-select: none;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-time {
      color: rgba(255,255,255,0.95);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .nav-divider {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.25);
    }

    .nav-location {
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.04em;
      font-family: 'DM Mono', monospace;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-weather {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .nav-temp {
      color: rgba(255,255,255,0.92);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .nav-condition {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-moon {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .nav-moon-name {
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .nav-arrow {
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: block;
      opacity: 0.5;
    }
    .nav-arrow.open { transform: rotate(180deg); }

    /* Drawer */
    .nav-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.28s ease;
      opacity: 0;
      position: relative;
      z-index: 1;
    }
    .nav-drawer.open {
      max-height: 120px;
      opacity: 1;
    }

    .drawer-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      padding: 12px 24px 16px;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .stat-pill {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 10px;
      backdrop-filter: blur(8px);
    }
    .nav-drawer.open .stat-pill              { opacity: 1; transform: translateY(0); }
    .nav-drawer.open .stat-pill:nth-child(1) { transition-delay: 0.05s; }
    .nav-drawer.open .stat-pill:nth-child(2) { transition-delay: 0.09s; }
    .nav-drawer.open .stat-pill:nth-child(3) { transition-delay: 0.13s; }
    .nav-drawer.open .stat-pill:nth-child(4) { transition-delay: 0.17s; }
    .nav-drawer.open .stat-pill:nth-child(5) { transition-delay: 0.21s; }
    .nav-drawer.open .stat-pill:nth-child(6) { transition-delay: 0.25s; }

    .pill-label {
      font-size: 7.5px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48);
      font-weight: 400;
      margin-bottom: 3px;
    }
    .pill-value {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="demo-bg">
    <div id="nav-bar"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const WMO = {
      0: ["Clear","clear"], 1: ["Mostly Clear","clear"], 2: ["Partly Cloudy","cloudy"],
      3: ["Overcast","cloudy"], 45: ["Foggy","fog"], 48: ["Icy Fog","fog"],
      51: ["Light Drizzle","drizzle"], 53: ["Drizzle","drizzle"], 55: ["Heavy Drizzle","drizzle"],
      61: ["Light Rain","rain"], 63: ["Rain","rain"], 65: ["Heavy Rain","rain"],
      71: ["Light Snow","snow"], 73: ["Snow","snow"], 75: ["Heavy Snow","snow"],
      80: ["Showers","rain"], 81: ["Rain Showers","rain"], 82: ["Heavy Showers","rain"],
      95: ["Thunderstorm","storm"], 99: ["Hail Storm","storm"],
    };

    const NAMED_MOONS = {
      0: "Wolf Moon", 1: "Snow Moon", 2: "Worm Moon", 3: "Pink Moon",
      4: "Flower Moon", 5: "Strawberry Moon", 6: "Buck Moon", 7: "Sturgeon Moon",
      8: "Harvest Moon", 9: "Hunter's Moon", 10: "Beaver Moon", 11: "Cold Moon",
    };

    function getMoonPhase(date = new Date()) {
      const known = new Date(2000, 0, 6, 18, 14, 0);
      const days = (date - known) / 86400000;
      const cycle = 29.53058867;
      const pct = ((days % cycle) + cycle) % cycle / cycle;
      if (pct < 0.025 || pct > 0.975) return { name: "New Moon",        icon: "new",             pct };
      if (pct < 0.25)                  return { name: "Waxing Crescent", icon: "waxing-crescent", pct };
      if (pct < 0.275)                 return { name: "First Quarter",   icon: "first-quarter",   pct };
      if (pct < 0.475)                 return { name: "Waxing Gibbous",  icon: "waxing-gibbous",  pct };
      if (pct < 0.525)                 return { name: "Full Moon", namedMoon: NAMED_MOONS[date.getMonth()], icon: "full", pct };
      if (pct < 0.725)                 return { name: "Waning Gibbous",  icon: "waning-gibbous",  pct };
      if (pct < 0.775)                 return { name: "Last Quarter",    icon: "last-quarter",    pct };
      return                                  { name: "Waning Crescent", icon: "waning-crescent", pct };
    }

    function MoonSVG({ size = 14 }) {
      const moon = getMoonPhase();
      const r = size / 2, s = size;
      const lit = "rgba(255,255,255,0.88)", dark = "rgba(255,255,255,0.1)", rim = "rgba(255,255,255,0.22)";
      const shapes = {
        "new":             <circle cx={r} cy={r} r={r-0.5} fill={dark} stroke={rim} strokeWidth="0.8"/>,
        "full":            <circle cx={r} cy={r} r={r-0.5} fill={lit}/>,
        "first-quarter":   <><circle cx={r} cy={r} r={r-0.5} fill={dark} stroke={rim} strokeWidth="0.8"/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 1 ${r} ${s-0.5}`} fill={lit}/></>,
        "last-quarter":    <><circle cx={r} cy={r} r={r-0.5} fill={dark} stroke={rim} strokeWidth="0.8"/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 0 ${r} ${s-0.5}`} fill={lit}/></>,
        "waxing-crescent": <><circle cx={r} cy={r} r={r-0.5} fill={dark} stroke={rim} strokeWidth="0.8"/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 1 ${r} ${s-0.5} A${r*.5} ${r-0.5} 0 0 0 ${r} 0.5`} fill={lit}/></>,
        "waxing-gibbous":  <><circle cx={r} cy={r} r={r-0.5} fill={lit}/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 0 ${r} ${s-0.5} A${r*.5} ${r-0.5} 0 0 1 ${r} 0.5`} fill={dark}/></>,
        "waning-gibbous":  <><circle cx={r} cy={r} r={r-0.5} fill={lit}/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 1 ${r} ${s-0.5} A${r*.5} ${r-0.5} 0 0 0 ${r} 0.5`} fill={dark}/></>,
        "waning-crescent": <><circle cx={r} cy={r} r={r-0.5} fill={dark} stroke={rim} strokeWidth="0.8"/><path d={`M${r} 0.5 A${r-0.5} ${r-0.5} 0 0 0 ${r} ${s-0.5} A${r*.5} ${r-0.5} 0 0 1 ${r} 0.5`} fill={lit}/></>,
      };
      return <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`}>{shapes[moon.icon] || shapes["new"]}</svg>;
    }

    function WeatherIcon({ type, size = 16 }) {
      const c = "rgba(255,255,255,0.82)";
      if (type === "clear") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="7.5" fill="none" stroke={c} strokeWidth="2.5"/>
          {[0,45,90,135,180,225,270,315].map((d,i) => {
            const x = Math.cos(d*Math.PI/180), y = Math.sin(d*Math.PI/180);
            return <line key={i} x1={20+11*x} y1={20+11*y} x2={20+15*x} y2={20+15*y} stroke={c} strokeWidth="2.5" strokeLinecap="round"/>;
          })}
        </svg>
      );
      if (type === "cloudy") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M8 27 Q8 20 17 20 Q19 13 27 13 Q35 13 35 21 Q39 21 39 27 Z" fill="none" stroke={c} strokeWidth="2.5" strokeLinejoin="round"/>
        </svg>
      );
      if (type === "rain" || type === "drizzle") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M5 21 Q5 14 14 14 Q15 8 23 8 Q31 8 31 16 Q37 16 37 21 Z" fill="none" stroke={c} strokeWidth="2.5" strokeLinejoin="round"/>
          <line x1="15" y1="27" x2="12" y2="33" stroke={c} strokeWidth="2" strokeLinecap="round"/>
          <line x1="23" y1="27" x2="20" y2="33" stroke={c} strokeWidth="2" strokeLinecap="round"/>
          <line x1="31" y1="27" x2="28" y2="33" stroke={c} strokeWidth="2" strokeLinecap="round"/>
        </svg>
      );
      if (type === "storm") return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          <path d="M5 20 Q5 13 14 13 Q15 7 23 7 Q31 7 31 15 Q37 15 37 20 Z" fill="none" stroke={c} strokeWidth="2.5" strokeLinejoin="round"/>
          <path d="M23 22 L18 30 L23 30 L18 38" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
        </svg>
      );
      return (
        <svg width={size} height={size} viewBox="0 0 40 40">
          {[12,20,28].map(y => <line key={y} x1="5" y1={y} x2="35" y2={y} stroke={c} strokeWidth="2.5" strokeLinecap="round" opacity={y===20?0.8:0.4}/>)}
        </svg>
      );
    }

    function getTime() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-AU", {
        hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Australia/Melbourne"
      }).formatToParts(now);
      return {
        h:    parts.find(p => p.type === "hour")?.value || "00",
        m:    parts.find(p => p.type === "minute")?.value || "00",
        date: now.toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short", timeZone: "Australia/Melbourne" }),
      };
    }

    function NavBar() {
      const [time, setTime]         = useState(getTime);
      const [expanded, setExpanded] = useState(false);
      const [weather, setWeather]   = useState({ temp: null, label: "…", type: "clear", feels: null, humidity: null, wind: null, uv: null });
      const moon = getMoonPhase();

      useEffect(() => {
        const id = setInterval(() => setTime(getTime()), 1000);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        fetch("https://api.open-meteo.com/v1/forecast?latitude=-37.8136&longitude=144.9631&current=temperature_2m,weather_code,apparent_temperature,relative_humidity_2m,wind_speed_10m,uv_index")
          .then(r => r.json())
          .then(data => {
            const c = data.current;
            const [label, type] = WMO[c.weather_code] || ["Unknown", "clear"];
            setWeather({ temp: Math.round(c.temperature_2m), feels: Math.round(c.apparent_temperature), humidity: Math.round(c.relative_humidity_2m), wind: Math.round(c.wind_speed_10m), uv: c.uv_index?.toFixed(1) ?? "—", label, type });
          })
          .catch(() => {});
      }, []);

      const stats = [
        ["Feels Like", weather.feels !== null ? `${weather.feels}°` : "—"],
        ["Humidity",   weather.humidity !== null ? `${weather.humidity}%` : "—"],
        ["Wind",       weather.wind !== null ? `${weather.wind} km/h` : "—"],
        ["UV Index",   weather.uv ?? "—"],
        ["Moon",       moon.namedMoon ?? moon.name],
        ["Condition",  weather.label || "—"],
      ];

      return (
        <div className="nav-inner">
          <div className="nav-bar" onClick={() => setExpanded(e => !e)}>

            <div className="nav-left">
              <span className="nav-time">{time.h}:{time.m}</span>
              <div className="nav-divider"/>
              <span className="nav-location">Melbourne · {time.date}</span>
            </div>

            <div className="nav-right">
              <div className="nav-weather">
                <WeatherIcon type={weather.type} size={16}/>
                <span className="nav-temp">{weather.temp !== null ? `${weather.temp}°` : "—"}</span>
                <span className="nav-condition">{weather.label}</span>
              </div>
              <div className="nav-divider"/>
              <div className="nav-moon">
                <MoonSVG size={14}/>
                <span className="nav-moon-name">{moon.name}</span>
              </div>
              <svg className={`nav-arrow ${expanded ? "open" : ""}`} width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M4.5 7 L9 11.5 L13.5 7" stroke="rgba(255,255,255,0.6)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>

          </div>

          <div className={`nav-drawer ${expanded ? "open" : ""}`}>
            <div className="drawer-grid">
              {stats.map(([label, value]) => (
                <div key={label} className="stat-pill">
                  <div className="pill-label">{label}</div>
                  <div className="pill-value">{value}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("nav-bar")).render(<NavBar/>);
  </script>
</body>
</html>
